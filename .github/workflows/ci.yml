name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: build
        run: cargo build -p device-api -p signaling -p steward -p sim-dog -p canis-media
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace
      - name: lab webrtc
        run: bash scripts/lab_webrtc.sh
      - name: scad present
        run: |
          test -s hardware/enclosure/terminal_base.scad
          test -s hardware/enclosure/button_pad.scad
