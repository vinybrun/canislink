# CanisLink lab coturn — pair with device-api CANIS_TURN_* env.
# For local docker-compose: listening on 3478, REST secret auth.

listening-port=3478
fingerprint
lt-cred-mech
use-auth-secret
static-auth-secret=canis-lab-turn-secret
realm=canislink.lab
# Allow loopback / docker bridge peers in lab
no-cli
no-tls
no-dtls
# Verbose for lab only
verbose
# Relay range (host network recommended for real NAT tests)
min-port=49160
max-port=49200
